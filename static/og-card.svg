<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f0f0"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle table felt texture -->
  <rect width="1200" height="630" fill="#0d7a3e" opacity="0.08"/>

  <!-- Left card: Ace of Spades -->
  <g transform="translate(180, 120) rotate(-12, 90, 170)" filter="url(#shadow)">
    <rect width="180" height="260" rx="12" fill="url(#card)" stroke="#ccc" stroke-width="1"/>
    <text x="18" y="38" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#1a1a2e">A</text>
    <text x="18" y="62" font-family="serif" font-size="22" fill="#1a1a2e">&#9824;</text>
    <!-- Large center spade -->
    <text x="90" y="155" font-family="serif" font-size="72" fill="#1a1a2e" text-anchor="middle">&#9824;</text>
    <text x="162" y="242" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#1a1a2e" text-anchor="end" transform="rotate(180, 162, 230)">A</text>
  </g>

  <!-- Center card: King of Spades -->
  <g transform="translate(340, 100)" filter="url(#shadow)">
    <rect width="180" height="260" rx="12" fill="url(#card)" stroke="#ccc" stroke-width="1"/>
    <text x="18" y="38" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#1a1a2e">K</text>
    <text x="18" y="62" font-family="serif" font-size="22" fill="#1a1a2e">&#9824;</text>
    <text x="90" y="155" font-family="serif" font-size="72" fill="#1a1a2e" text-anchor="middle">&#9824;</text>
    <text x="90" y="180" font-family="Georgia, serif" font-size="18" fill="#667eea" text-anchor="middle" font-weight="bold">K</text>
  </g>

  <!-- Right card: Queen of Spades -->
  <g transform="translate(500, 120) rotate(12, 90, 170)" filter="url(#shadow)">
    <rect width="180" height="260" rx="12" fill="url(#card)" stroke="#ccc" stroke-width="1"/>
    <text x="18" y="38" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#1a1a2e">Q</text>
    <text x="18" y="62" font-family="serif" font-size="22" fill="#1a1a2e">&#9824;</text>
    <text x="90" y="155" font-family="serif" font-size="72" fill="#1a1a2e" text-anchor="middle">&#9824;</text>
  </g>

  <!-- Title text -->
  <text x="870" y="200" font-family="Georgia, serif" font-size="56" fill="#ffffff" text-anchor="middle" font-weight="bold" filter="url(#glow)">Two-Man</text>
  <text x="870" y="270" font-family="Georgia, serif" font-size="56" fill="#ffffff" text-anchor="middle" font-weight="bold" filter="url(#glow)">Spades</text>

  <!-- Subtitle -->
  <text x="870" y="320" font-family="Arial, sans-serif" font-size="22" fill="#94a3b8" text-anchor="middle">Free 2-Player Card Game</text>

  <!-- Feature pills -->
  <g transform="translate(870, 360)">
    <rect x="-180" y="0" width="110" height="32" rx="16" fill="#667eea" opacity="0.8"/>
    <text x="-125" y="22" font-family="Arial, sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="bold">Blind Bids</text>

    <rect x="-55" y="0" width="110" height="32" rx="16" fill="#764ba2" opacity="0.8"/>
    <text x="0" y="22" font-family="Arial, sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="bold">AI Opponent</text>

    <rect x="70" y="0" width="110" height="32" rx="16" fill="#e74c8b" opacity="0.8"/>
    <text x="125" y="22" font-family="Arial, sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="bold">Free to Play</text>
  </g>

  <!-- URL -->
  <text x="870" y="440" font-family="Arial, sans-serif" font-size="20" fill="#60a5fa" text-anchor="middle">2manspades.com</text>

  <!-- Decorative spade symbols scattered -->
  <text x="50" y="580" font-family="serif" font-size="40" fill="#ffffff" opacity="0.06">&#9824;</text>
  <text x="150" y="50" font-family="serif" font-size="30" fill="#ffffff" opacity="0.06">&#9824;</text>
  <text x="1100" y="580" font-family="serif" font-size="40" fill="#ffffff" opacity="0.06">&#9824;</text>
  <text x="1050" y="80" font-family="serif" font-size="30" fill="#ffffff" opacity="0.06">&#9824;</text>
  <text x="700" y="560" font-family="serif" font-size="25" fill="#ffffff" opacity="0.06">&#9824;</text>
</svg>
